---
# roles/docker/tasks/main.yml

- name: Instala dependências do Docker
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      # apt-transport-https integrado ao apt desde Ubuntu 18.04 — desnecessário
    state: present
  tags: [docker]

- name: Cria diretório /etc/apt/keyrings
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  tags: [docker]

- name: Baixa GPG key do Docker (apt_key depreciado no Ubuntu 24.04)
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
    force: false
  tags: [docker]

- name: Adiciona repositório Docker
  apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
    state: present
    filename: docker
    update_cache: yes
  tags: [docker]

- name: Instala Docker Engine
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
  tags: [docker]

- name: Habilita e inicia serviço Docker
  systemd:
    name: docker
    enabled: yes
    state: started
  tags: [docker]

- name: Adiciona usuário corrente no grupo docker
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes
  tags: [docker]

- name: Configura daemon Docker (log rotation + storage driver)
  copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "100m",
          "max-file": "3"
        },
        "storage-driver": "overlay2"
      }
  notify: Restart Docker
  tags: [docker, config]

- name: Cria rede Docker para o cluster GeoServer
  community.docker.docker_network:
    name: geoserver_cluster
    driver: bridge
  when: inventory_hostname in groups['geoserver']
  tags: [docker]
