---
# roles/geonode/tasks/main.yml

- name: Cria diretórios GeoNode
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'
  loop:
    - /opt/geonode
    - /opt/geonode/static
    - /opt/geonode/media
    - /opt/geonode/backup
  tags: [geonode]

- name: Copia docker-compose do GeoNode
  template:
    src: docker-compose.geonode.yml.j2
    dest: /opt/geonode/docker-compose.yml
    mode: '0644'
  notify: Restart GeoNode
  tags: [geonode, config]

- name: Gera .env do GeoNode
  template:
    src: geonode.env.j2
    dest: /opt/geonode/.env
    mode: '0600'
  notify: Restart GeoNode
  tags: [geonode, config]

# ------------------------------------------------------------------
# nginx-internal.conf — server block extra para o IP interno do GeoNode.
# Permite que o GeoServer chame /o/token/ e /api/o/v4/tokeninfo/
# diretamente pela rede privada, evitando hairpin NAT do OpenStack.
# O bloco principal do Nginx só aceita o hostname público; qualquer
# outro Host cai no default_server que retorna 444.
# ------------------------------------------------------------------
- name: Gera nginx-internal.conf para aceitar IP interno
  template:
    src: nginx-internal.conf.j2
    dest: /opt/geonode/nginx-internal.conf
    mode: '0644'
  notify: Restart GeoNode
  tags: [geonode, config, oauth2]

- name: Cria serviço systemd GeoNode
  template:
    src: geonode.service.j2
    dest: /etc/systemd/system/geonode.service
    mode: '0644'
  notify:
    - Reload systemd
    - Restart GeoNode
  tags: [geonode]

- name: Habilita e inicia GeoNode
  systemd:
    name: geonode
    enabled: yes
    state: started
    daemon_reload: yes
  tags: [geonode]

# O Nginx da imagem geonode/nginx bloqueia requests com Host: localhost
# retornando 444. Usa-se 127.0.0.1 que está sempre no server_name.
- name: Aguarda GeoNode responder (até 10 minutos)
  uri:
    url: "http://127.0.0.1/api/v2/resources/"
    status_code: [200, 401, 403]
    timeout: 10
  register: gn_health
  until: gn_health.status in [200, 401, 403]
  retries: 60
  delay: 10
  tags: [geonode]

- name: Executa migrações Django
  community.docker.docker_container_exec:
    container: geonode_django
    command: python manage.py migrate --noinput
  register: migrate_result
  changed_when: "'No migrations to apply' not in migrate_result.stdout"
  tags: [geonode, migrate]

- name: Cria superusuário GeoNode
  community.docker.docker_container_exec:
    container: geonode_django
    command: >-
      python manage.py shell -c
      "from django.contrib.auth import get_user_model; User = get_user_model(); User.objects.filter(username='{{ geonode_admin_user }}').exists() or User.objects.create_superuser('{{ geonode_admin_user }}', '{{ geonode_admin_email }}', '{{ geonode_admin_password }}')"
  changed_when: false
  tags: [geonode, users]

- name: Coleta arquivos estáticos
  community.docker.docker_container_exec:
    container: geonode_django
    command: python manage.py collectstatic --noinput
  changed_when: false
  tags: [geonode, static]

# invoke prepare configura OAuth2 e fixtures de integração com GeoServer.
# Requer OAUTH2_CLIENT_ID e OAUTH2_CLIENT_SECRET no .env.
# Se as variáveis estiverem vazias, pula silenciosamente.
- name: Executa invoke prepare (configura OAuth2 e GeoServer)
  community.docker.docker_container_exec:
    container: geonode_django
    command: invoke prepare
    env:
      OAUTH2_CLIENT_ID: "{{ oauth2_client_id }}"
      OAUTH2_CLIENT_SECRET: "{{ oauth2_client_secret }}"
  changed_when: false
  when: oauth2_client_id | length > 0
  tags: [geonode, oauth2]

# O invoke prepare gera redirect_uris como {SITEURL}geoserver/index.html
# mas o GeoServer usa /geoserver/web/ para o redirect OAuth2.
# Corrigimos aqui para usar a URL correta do web UI.
- name: Corrige redirect URIs da aplicação OAuth2
  community.docker.docker_container_exec:
    container: geonode_django
    command: >-
      python manage.py shell -c
      "from oauth2_provider.models import Application;
      app = Application.objects.filter(name='GeoServer').first();
      app and setattr(app, 'redirect_uris', 'http://{{ geonode_public_hostname }}/geoserver/web/\nhttp://{{ geonode_public_hostname }}/geoserver/index.html') or None;
      app and app.save();
      print('redirect_uris:', app.redirect_uris if app else 'app not found')"
  changed_when: false
  when: oauth2_client_id | length > 0
  tags: [geonode, oauth2]
