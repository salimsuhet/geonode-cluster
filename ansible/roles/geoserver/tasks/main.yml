---
# roles/geoserver/tasks/main.yml
# Deploya o GeoServer via Docker em cada nó (write ou read)
# A variável `geoserver_role` (write|read) e `geoserver_is_master` (bool)
# são definidas no inventário por host.

# ------------------------------------------------------------------
# Usuário e grupos
# ------------------------------------------------------------------
- name: Cria grupo geoserver
  group:
    name: geoserver
    state: present
  tags: [geoserver]

- name: Cria usuário geoserver
  user:
    name: geoserver
    group: geoserver
    groups: docker
    append: yes
    shell: /usr/sbin/nologin
    home: /opt/geoserver
    create_home: no
    system: yes
    state: present
  tags: [geoserver]

- name: Cria estrutura de diretórios GeoServer
  file:
    path: "{{ item }}"
    state: directory
    owner: geoserver
    group: geoserver
    mode: '0755'
  loop:
    - "{{ geoserver_data_dir }}"
    - "{{ geoserver_data_dir }}/logs"
    - "{{ geoserver_data_dir }}/gwc"
    - "{{ geoserver_data_dir }}/security/filter/geonode-oauth2"
    - /opt/geoserver/config
  tags: [geoserver]

# ------------------------------------------------------------------
# Pré-população do data dir (apenas no master — workers herdam via NFS)
# ------------------------------------------------------------------
- name: Pré-popula data dir com configuração padrão da imagem (primeira execução)
  shell: |
    docker run --rm \
      -v {{ geoserver_data_dir }}:/target \
      --entrypoint sh \
      {{ geoserver_image }} \
      -c "cp -rn /usr/local/tomcat/webapps/geoserver/data/. /target/"
    chown -R geoserver:geoserver {{ geoserver_data_dir }}
  args:
    creates: "{{ geoserver_data_dir }}/global.xml"
  tags: [geoserver]

# ------------------------------------------------------------------
# Script corrigido do entrypoint da imagem geonode/geoserver.
#
# O set_geoserver_auth.sh original adiciona `echo " " >> file` antes
# de processar cada arquivo XML de segurança (config.xml do OAuth2,
# role service, auth provider e global.xml). Esse trailing whitespace
# causa java.io.EOFException no XStream ao carregar as configurações
# durante a autenticação OAuth2.
#
# Montamos uma versão corrigida (sem o echo) via volume no docker-compose,
# sobrescrevendo o script da imagem antes do container iniciar.
# ------------------------------------------------------------------
- name: Copia set_geoserver_auth.sh corrigido para o host
  copy:
    src: set_geoserver_auth.sh
    dest: /opt/geoserver/set_geoserver_auth.sh
    owner: root
    group: root
    mode: '0755'
  notify: Restart GeoServer
  tags: [geoserver, oauth2]

# ------------------------------------------------------------------
# Plugins (baixa apenas no master; workers herdam via NFS)
# ------------------------------------------------------------------
- name: Cria diretório de plugins
  file:
    path: /opt/geoserver/plugins
    state: directory
    owner: geoserver
    mode: '0755'
  when: geoserver_is_master | bool
  tags: [geoserver, plugins]

- name: Download e instalação dos plugins GeoServer
  include_tasks: plugins.yml
  when: geoserver_is_master | bool
  tags: [geoserver, plugins]

# ------------------------------------------------------------------
# Configuração OAuth2 — cria o config.xml do filtro geonode-oauth2
#
# ATENÇÃO: o campo <cliendId> (sem 't') é intencional — é o nome
# do campo Java na classe GeoNodeOAuthAuthenticationFilterConfig.
# O XStream deserializa pelo nome do campo, não pelo nome semântico.
# Corrigir para <clientId> faz o plugin retornar client_id=null.
#
# Só aplica no master e se oauth2_client_id estiver definido.
# ------------------------------------------------------------------
- name: Cria config.xml do filtro OAuth2 do GeoServer
  template:
    src: geonode-oauth2.config.xml.j2
    dest: "{{ geoserver_data_dir }}/security/filter/geonode-oauth2/config.xml"
    owner: geoserver
    group: geoserver
    mode: '0644'
  when:
    - geoserver_is_master | bool
    - oauth2_client_id | length > 0
  notify: Restart GeoServer
  tags: [geoserver, oauth2]

# ------------------------------------------------------------------
# Corrige o proxyBaseUrl no global.xml para usar o hostname público.
# Sem isso, o Spring Security monta o form action com o IP interno
# do VIP e a CSP (form-action 'self') bloqueia o login OAuth2.
# Usa replace (regex) para evitar dependência de lxml no host remoto.
# ------------------------------------------------------------------
- name: Corrige proxyBaseUrl no global.xml do GeoServer
  replace:
    path: "{{ geoserver_data_dir }}/global.xml"
    regexp: '<proxyBaseUrl>.*</proxyBaseUrl>'
    replace: '<proxyBaseUrl>http://{{ geonode_public_hostname }}/geoserver</proxyBaseUrl>'
  when: geoserver_is_master | bool
  notify: Restart GeoServer
  tags: [geoserver, oauth2]

# ------------------------------------------------------------------
# Configuração de clustering JMS
# ------------------------------------------------------------------
- name: Cria arquivo cluster.properties
  template:
    src: cluster.properties.j2
    dest: "{{ geoserver_data_dir }}/cluster.properties"
    owner: geoserver
    group: geoserver
    mode: '0644'
  notify: Restart GeoServer
  tags: [geoserver, config]

# ------------------------------------------------------------------
# Docker Compose
# ------------------------------------------------------------------
- name: Gera docker-compose.yml do GeoServer
  template:
    src: docker-compose.geoserver.yml.j2
    dest: /opt/geoserver/docker-compose.yml
    owner: geoserver
    group: geoserver
    mode: '0644'
  notify: Restart GeoServer
  tags: [geoserver, config]

- name: Gera .env do GeoServer
  template:
    src: geoserver.env.j2
    dest: /opt/geoserver/.env
    owner: geoserver
    group: geoserver
    mode: '0600'
  notify: Restart GeoServer
  tags: [geoserver, config]

- name: Cria serviço systemd para GeoServer
  template:
    src: geoserver.service.j2
    dest: /etc/systemd/system/geoserver.service
    mode: '0644'
  notify:
    - Reload systemd
    - Restart GeoServer
  tags: [geoserver]

- name: Habilita e inicia serviço GeoServer
  systemd:
    name: geoserver
    enabled: yes
    state: started
    daemon_reload: yes
  tags: [geoserver]

# ------------------------------------------------------------------
# Healthcheck (aguarda GeoServer subir antes de continuar)
# ------------------------------------------------------------------
- name: Aguarda GeoServer responder (até 5 minutos)
  uri:
    url: "http://localhost:{{ geoserver_port }}/geoserver/web/"
    status_code: [200, 302]
    timeout: 10
  register: gs_health
  until: gs_health.status in [200, 302]
  retries: 30
  delay: 10
  when: geoserver_is_master | bool
  tags: [geoserver]
