---
# roles/geoserver/tasks/main.yml
# Deploya o GeoServer via Docker em cada nó (write ou read)
# A variável `geoserver_role` (write|read) e `geoserver_is_master` (bool)
# são definidas no inventário por host.

# ------------------------------------------------------------------
# Usuário e grupos
# ------------------------------------------------------------------
- name: Cria grupo geoserver
  group:
    name: geoserver
    state: present
  tags: [geoserver]

- name: Cria usuário geoserver
  user:
    name: geoserver
    group: geoserver
    groups: docker
    append: yes
    shell: /usr/sbin/nologin
    home: /opt/geoserver
    create_home: no
    system: yes
    state: present
  tags: [geoserver]

- name: Cria estrutura de diretórios GeoServer
  file:
    path: "{{ item }}"
    state: directory
    owner: geoserver
    group: geoserver
    mode: '0755'
  loop:
    - "{{ geoserver_data_dir }}"
    - "{{ geoserver_data_dir }}/logs"
    - "{{ geoserver_data_dir }}/gwc"
    - "{{ geoserver_data_dir }}/security/filter/geonode-oauth2"
    - /opt/geoserver/config
  tags: [geoserver]

# ------------------------------------------------------------------
# Pré-popula o data dir com a configuração padrão da imagem
# (necessário na primeira execução para ter os arquivos base)
# ------------------------------------------------------------------
- name: Pré-popula data dir com configuração padrão da imagem (primeira execução)
  command: >
    docker run --rm
    -v {{ geoserver_data_dir }}:/mnt/geoserver_data
    --entrypoint sh
    {{ geoserver_image }}
    -c "cp -rn /opt/geoserver/data_dir/. /mnt/geoserver_data/ 2>/dev/null || true"
  args:
    creates: "{{ geoserver_data_dir }}/global.xml"
  when: geoserver_is_master | bool
  tags: [geoserver]

# ------------------------------------------------------------------
# Plugins (baixa apenas no master; workers herdam via NFS)
# ------------------------------------------------------------------
- name: Cria diretório de plugins
  file:
    path: /opt/geoserver/plugins
    state: directory
    owner: geoserver
    mode: '0755'
  when: geoserver_is_master | bool
  tags: [geoserver, plugins]

- name: Download e instalação dos plugins GeoServer
  include_tasks: plugins.yml
  when: geoserver_is_master | bool
  tags: [geoserver, plugins]

# ------------------------------------------------------------------
# Configuração OAuth2 — cria o config.xml do filtro geonode-oauth2
# O entrypoint da imagem substitui os valores se o arquivo existir,
# mas não cria o arquivo do zero. Criamos aqui com os valores corretos.
# Só aplica se oauth2_client_id estiver definido.
# ------------------------------------------------------------------
- name: Cria config.xml do filtro OAuth2 do GeoServer
  template:
    src: geonode-oauth2.config.xml.j2
    dest: "{{ geoserver_data_dir }}/security/filter/geonode-oauth2/config.xml"
    owner: geoserver
    group: geoserver
    mode: '0644'
  when:
    - geoserver_is_master | bool
    - oauth2_client_id | length > 0
  notify: Restart GeoServer
  tags: [geoserver, oauth2]

# ------------------------------------------------------------------
# Configuração de clustering JMS
# ------------------------------------------------------------------
- name: Cria arquivo cluster.properties
  template:
    src: cluster.properties.j2
    dest: "{{ geoserver_data_dir }}/cluster.properties"
    owner: geoserver
    group: geoserver
    mode: '0644'
  notify: Restart GeoServer
  tags: [geoserver, config]

# ------------------------------------------------------------------
# Docker Compose
# ------------------------------------------------------------------
- name: Gera docker-compose.yml do GeoServer
  template:
    src: docker-compose.geoserver.yml.j2
    dest: /opt/geoserver/docker-compose.yml
    owner: geoserver
    group: geoserver
    mode: '0644'
  notify: Restart GeoServer
  tags: [geoserver, config]

- name: Gera .env do GeoServer
  template:
    src: geoserver.env.j2
    dest: /opt/geoserver/.env
    owner: geoserver
    group: geoserver
    mode: '0600'
  notify: Restart GeoServer
  tags: [geoserver, config]

- name: Cria serviço systemd para GeoServer
  template:
    src: geoserver.service.j2
    dest: /etc/systemd/system/geoserver.service
    mode: '0644'
  notify:
    - Reload systemd
    - Restart GeoServer
  tags: [geoserver]

- name: Habilita e inicia serviço GeoServer
  systemd:
    name: geoserver
    enabled: yes
    state: started
    daemon_reload: yes
  tags: [geoserver]

# ------------------------------------------------------------------
# Healthcheck (aguarda GeoServer subir antes de continuar)
# ------------------------------------------------------------------
- name: Aguarda GeoServer responder (até 5 minutos)
  uri:
    url: "http://localhost:{{ geoserver_port }}/geoserver/web/"
    status_code: [200, 302]
    timeout: 10
  register: gs_health
  until: gs_health.status in [200, 302]
  retries: 30
  delay: 10
  when: geoserver_is_master | bool
  tags: [geoserver]
