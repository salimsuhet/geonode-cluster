---
# roles/common/tasks/main.yml

# =============================================================================
# PROXY — configurado antes do primeiro apt para garantir conectividade
# =============================================================================
- name: Proxy — configura apt (quando HTTP_PROXY definido)
  copy:
    dest: /etc/apt/apt.conf.d/99proxy
    content: |
      Acquire::http::Proxy  "{{ http_proxy }}";
      Acquire::https::Proxy "{{ https_proxy }}";
    mode: '0644'
  when: http_proxy | default('') | length > 0
  tags: [common, proxy]

- name: Proxy — remove config apt (quando HTTP_PROXY vazio)
  file:
    path: /etc/apt/apt.conf.d/99proxy
    state: absent
  when: http_proxy | default('') | length == 0
  tags: [common, proxy]

- name: Proxy — configura variáveis de ambiente do sistema
  copy:
    dest: /etc/profile.d/proxy.sh
    content: |
      export http_proxy="{{ http_proxy }}"
      export https_proxy="{{ https_proxy }}"
      export HTTP_PROXY="{{ http_proxy }}"
      export HTTPS_PROXY="{{ https_proxy }}"
      export no_proxy="{{ no_proxy }}"
      export NO_PROXY="{{ no_proxy }}"
    mode: '0644'
  when: http_proxy | default('') | length > 0
  tags: [common, proxy]

- name: Proxy — remove variáveis de ambiente (quando HTTP_PROXY vazio)
  file:
    path: /etc/profile.d/proxy.sh
    state: absent
  when: http_proxy | default('') | length == 0
  tags: [common, proxy]

- name: Proxy — configura Docker daemon (criado antes da role docker)
  block:
    - name: Cria diretório systemd do Docker
      file:
        path: /etc/systemd/system/docker.service.d
        state: directory
        mode: '0755'

    - name: Gera http-proxy.conf para Docker
      copy:
        dest: /etc/systemd/system/docker.service.d/http-proxy.conf
        content: |
          [Service]
          Environment="HTTP_PROXY={{ http_proxy }}"
          Environment="HTTPS_PROXY={{ https_proxy }}"
          Environment="NO_PROXY={{ no_proxy }}"
        mode: '0644'
  when:
    - http_proxy | default('') | length > 0
    - inventory_hostname in groups['geoserver'] or inventory_hostname in groups['geonode']
  tags: [common, proxy]

# =============================================================================
# PACOTES BASE
# =============================================================================
- name: Atualiza cache de pacotes
  apt:
    update_cache: yes
    cache_valid_time: 3600
  tags: [common]

- name: Instala pacotes base
  apt:
    name:
      - curl
      - wget
      - git
      - vim
      - htop
      - net-tools
      - nfs-common
      - python3-pip
      - python3-apt
      - ca-certificates
      - gnupg
      - lsb-release
      - unzip
      - jq
      - acl
    state: present
  tags: [common]

- name: Configura timezone
  timezone:
    name: "{{ django_time_zone }}"
  tags: [common]

- name: Configura sysctl — performance de rede
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
  loop:
    - { key: net.ipv4.tcp_fin_timeout,        value: "30"    }
    - { key: net.ipv4.tcp_keepalive_time,      value: "1200"  }
    - { key: net.ipv4.tcp_max_syn_backlog,     value: "2048"  }
    - { key: net.core.somaxconn,               value: "65535" }
    - { key: net.core.netdev_max_backlog,      value: "5000"  }
    - { key: vm.swappiness,                    value: "10"    }
    - { key: vm.dirty_ratio,                   value: "15"    }
    - { key: vm.dirty_background_ratio,        value: "5"     }
  tags: [common, sysctl]

- name: Aumenta limites de arquivo (ulimits)
  pam_limits:
    domain: "*"
    limit_type: "{{ item.type }}"
    limit_item: nofile
    value: "{{ item.value }}"
  loop:
    - { type: soft, value: "65536" }
    - { type: hard, value: "65536" }
  tags: [common]

- name: Cria usuário de serviço para geoserver
  user:
    name: geoserver
    system: yes
    shell: /bin/bash
    home: /opt/geoserver
    create_home: yes
  when: inventory_hostname in groups['geoserver']
  tags: [common]

- name: Configura /etc/hosts com todos os nós do cluster
  lineinfile:
    path: /etc/hosts
    line: "{{ item.ip }}  {{ item.name }}"
    regexp: ".*{{ item.name }}.*"
    state: present
  loop:
    - { ip: "{{ ip_db }}",               name: "db" }
    - { ip: "{{ ip_geonode }}",          name: "geonode" }
    - { ip: "{{ ip_geoserver_write }}",  name: "geoserver-write" }
    - { ip: "{{ ip_geoserver_read_1 }}", name: "geoserver-read-1" }
    - { ip: "{{ ip_geoserver_read_2 }}", name: "geoserver-read-2" }
    - { ip: "{{ ip_haproxy_1 }}",        name: "haproxy-1" }
    - { ip: "{{ ip_haproxy_2 }}",        name: "haproxy-2" }
    - { ip: "{{ haproxy_vip }}",         name: "geoserver.local geonode.local" }
  tags: [common, hosts]
