---
# roles/keepalived/tasks/main.yml
# Configura VRRP entre haproxy-1 (MASTER) e haproxy-2 (BACKUP)

- name: Instala Keepalived
  apt:
    name: keepalived
    state: present
  tags: [keepalived]

# ── Detecta interface de rede privada automaticamente ─────────────────────────
# No Ubuntu 24.04 a nomenclatura é enp0s8 / ens6, não eth1
- name: Detecta interface de rede privada (fallback se keepalived_interface=eth1)
  set_fact:
    keepalived_interface: >-
      {{ ansible_interfaces
         | reject('equalto', 'lo')
         | select('match', '^(eth|enp|ens)')
         | list | last }}
  when: keepalived_interface == 'eth1' and ansible_interfaces is defined
  tags: [keepalived]

- name: Exibe interface selecionada para o Keepalived
  debug:
    msg: "Interface Keepalived: {{ keepalived_interface }}"
  tags: [keepalived]

- name: Gera configuração Keepalived
  template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart Keepalived
  tags: [keepalived, config]

- name: Cria script de healthcheck HAProxy
  copy:
    dest: /etc/keepalived/check_haproxy.sh
    content: |
      #!/bin/bash
      if systemctl is-active --quiet haproxy; then
        exit 0
      fi
      systemctl start haproxy
      sleep 2
      systemctl is-active --quiet haproxy
      exit $?
    mode: '0755'
  tags: [keepalived]

- name: Habilita e inicia Keepalived
  systemd:
    name: keepalived
    enabled: yes
    state: started
  tags: [keepalived]

- name: Verifica VIP no nó MASTER
  command: "ip addr show {{ keepalived_interface }}"
  register: vip_check
  changed_when: false
  when: keepalived_role == 'MASTER'
  tags: [keepalived]

- name: Exibe status do VIP
  debug:
    msg: >-
      VIP {{ haproxy_vip }}
      {{ 'ATIVO neste nó' if haproxy_vip in vip_check.stdout else 'não atribuído (normal em BACKUP)' }}
  when: keepalived_role == 'MASTER'
  tags: [keepalived]
