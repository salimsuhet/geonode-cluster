---
# inventories/production/group_vars/all.yml
# Para produção: sobrescreve apenas o usuário SSH e o env

ansible_user: "{{ lookup('env', 'ANSIBLE_SSH_USER') | default('ubuntu', true) }}"
ansible_ssh_private_key_file: "{{ lookup('env', 'ANSIBLE_SSH_PRIVATE_KEY') | default('~/.ssh/id_rsa', true) }}"
ansible_become: true
ansible_become_method: sudo
deploy_env: production

# Em produção o VIP é diferente
haproxy_vip: "{{ lookup('env', 'HAPROXY_VIP_PROD') | default(lookup('env', 'HAPROXY_VIP') | default('10.0.0.50', true), true) }}"
