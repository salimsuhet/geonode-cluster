---
# =============================================================================
# inventories/vagrant/hosts.yml — Inventário para ambiente Vagrant (dev)
# IPs devem bater com os definidos no Vagrantfile / envs/.env
# =============================================================================

all:
  vars:
    ansible_user: vagrant
    ansible_ssh_private_key_file: ~/.vagrant.d/insecure_private_key
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
    ansible_python_interpreter: /usr/bin/python3
    deploy_env: vagrant

  children:

    # -------------------------------------------------------------------------
    # Banco de Dados
    # -------------------------------------------------------------------------
    db:
      hosts:
        db:
          ansible_host: 192.168.56.10

    # -------------------------------------------------------------------------
    # GeoNode
    # -------------------------------------------------------------------------
    geonode:
      hosts:
        geonode:
          ansible_host: 192.168.56.20

    # -------------------------------------------------------------------------
    # GeoServer — Write (Master JMS)
    # -------------------------------------------------------------------------
    geoserver_write:
      hosts:
        geoserver-write:
          ansible_host: 192.168.56.30
          geoserver_role: write
          geoserver_cluster_instance_name: "{{ geoserver_cluster_instance_name_write }}"
          geoserver_is_master: true
          nfs_server_role: true

    # -------------------------------------------------------------------------
    # GeoServer — Read (Workers JMS)
    # -------------------------------------------------------------------------
    geoserver_read:
      hosts:
        geoserver-read-1:
          ansible_host: 192.168.56.31
          geoserver_role: read
          geoserver_cluster_instance_name: "{{ geoserver_cluster_instance_name_read_1 }}"
          geoserver_is_master: false
          nfs_client_role: true
        geoserver-read-2:
          ansible_host: 192.168.56.32
          geoserver_role: read
          geoserver_cluster_instance_name: "{{ geoserver_cluster_instance_name_read_2 }}"
          geoserver_is_master: false
          nfs_client_role: true

    # -------------------------------------------------------------------------
    # Grupo lógico: todos os nós GeoServer
    # -------------------------------------------------------------------------
    geoserver:
      children:
        geoserver_write:
        geoserver_read:

    # -------------------------------------------------------------------------
    # HAProxy
    # -------------------------------------------------------------------------
    haproxy:
      hosts:
        haproxy-1:
          ansible_host: 192.168.56.40
          keepalived_role: MASTER
          keepalived_priority: 101
        haproxy-2:
          ansible_host: 192.168.56.41
          keepalived_role: BACKUP
          keepalived_priority: 100
