---
# =============================================================================
# site.yml — Playbook principal de orquestração
# Executa todos os papéis na ordem correta
# =============================================================================

# 1. Setup base em todas as VMs
- name: Common — Setup base
  hosts: all
  become: true
  tags: [common]
  roles:
    - common

# 2. Instala Docker em todos os nós que precisam (exceto haproxy e db)
- name: Docker — Instala engine
  hosts: geonode, geoserver
  become: true
  tags: [docker]
  roles:
    - docker

# 3. Banco de dados
- name: Database — PostgreSQL + PostGIS
  hosts: db
  become: true
  tags: [database]
  roles:
    - database

# 4. NFS — Servidor (geoserver-write exporta o data dir)
- name: NFS Server — GeoServer data dir
  hosts: geoserver_write
  become: true
  tags: [nfs, nfs_server]
  roles:
    - nfs_server

# 5. NFS — Clientes (workers montam o data dir do master)
- name: NFS Client — Monta data dir compartilhado
  hosts: geoserver_read
  become: true
  tags: [nfs, nfs_client]
  roles:
    - nfs_client

# 6. GeoServer Write (Master)
- name: GeoServer — Master (Write)
  hosts: geoserver_write
  become: true
  tags: [geoserver, geoserver_write]
  roles:
    - geoserver

# 7. GeoServer Read (Workers) — após o master estar UP
- name: GeoServer — Workers (Read)
  hosts: geoserver_read
  become: true
  tags: [geoserver, geoserver_read]
  roles:
    - geoserver

# 8. GeoNode
- name: GeoNode — Aplicação
  hosts: geonode
  become: true
  tags: [geonode]
  roles:
    - geonode

# 9. HAProxy
- name: HAProxy — Load Balancer
  hosts: haproxy
  become: true
  tags: [haproxy]
  roles:
    - haproxy

# 10. Keepalived — VIP entre os dois HAProxy
- name: Keepalived — Alta disponibilidade HAProxy
  hosts: haproxy
  become: true
  tags: [keepalived]
  roles:
    - keepalived
